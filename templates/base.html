<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PlantusAI{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/static/favicon/site.webmanifest">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>🌱 PlantusAI</h1>
            </div>
            <ul class="nav-links">
                <li><a href="{{ url_for('index') }}">Home</a></li>
                <li><a href="{{ url_for('about') }}">About</a></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="padding: 0; max-width: 100%;">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>Plantus AI — Plant Disease Detection AI</p>
        <div class="social-links">
            <a href="https://www.linkedin.com/in/yunus-karatas/" target="_blank">LinkedIn</a>
            <a href="https://github.com/qkloun" target="_blank">GitHub</a>
            <a href="mailto:karatasyunus@icloud.com.com">Email</a>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
